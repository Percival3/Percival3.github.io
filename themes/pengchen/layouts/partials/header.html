<header class="w-full bg-white dark:bg-slate-900 border-b border-slate-200 dark:border-slate-700 
               px-6 py-4 flex items-center justify-between sticky top-0 z-50">

    <!-- 网站标题 -->
    <a href="/" class="text-xl font-bold text-slate-800 dark:text-slate-100">
        {{ .Site.Title }}
    </a>

    <!-- 右上角导航菜单 -->
    <nav class="flex items-center gap-6 text-slate-700 dark:text-slate-200 text-sm">
        {{ range .Site.Menus.main }}
        <a href="{{ .URL }}" 
           class="hover:text-blue-600 dark:hover:text-blue-400 transition">
            {{ .Name }}
        </a>
        {{ end }}
    </nav>
</header>
