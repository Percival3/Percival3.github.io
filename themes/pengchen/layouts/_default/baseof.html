<!DOCTYPE html>
<html lang="{{ .Site.LanguageCode }}">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{{ .Title }} - {{ .Site.Title }}</title>

    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>

    <!-- KaTeX 数学公式 -->
    {{ if .Site.Params.math }}
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/katex@0.16.9/dist/katex.min.css">
    <script defer src="https://cdn.jsdelivr.net/npm/katex@0.16.9/dist/katex.min.js"></script>
    <script defer src="https://cdn.jsdelivr.net/npm/katex@0.16.9/dist/contrib/auto-render.min.js"
        onload="renderMathInElement(document.body);">
    </script>
    {{ end }}

    <!-- Lucide Icons -->
    <script src="https://unpkg.com/lucide@latest"></script>

    <!-- 滚动条 & 动画 -->
    <style>
        ::-webkit-scrollbar { width: 8px; }
        ::-webkit-scrollbar-track { background: #f1f5f9; }
        ::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 4px; }
        ::-webkit-scrollbar-thumb:hover { background: #94a3b8; }

        .fade-in { animation: fadeIn 0.5s ease-in-out; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
    </style>
</head>

<!-- 加入 dark class 支持 -->
<body class="bg-slate-50 dark:bg-slate-900 dark:text-slate-100 font-sans text-slate-900 transition-colors duration-200">

    <!-- 🌗 日夜切换按钮（右上角） -->
    <button id="theme-toggle"
        class="fixed top-4 right-4 p-2 rounded-lg shadow bg-white dark:bg-slate-700 text-slate-700 dark:text-slate-200">
        <i data-lucide="moon"></i>
    </button>

    <!-- 主布局 -->
    <div class="flex flex-col md:flex-row min-h-screen">

        {{ partial "sidebar.html" . }}

        <main class="flex-1 p-6 md:p-12 lg:p-16 overflow-y-auto min-h-screen">
            <div class="max-w-4xl mx-auto">
                <div class="md:hidden mb-6 flex items-center justify-between bg-white dark:bg-slate-800 p-4 rounded-lg shadow-sm">
                    <span class="font-bold text-blue-600">{{ .Title }}</span>
                    <span class="text-xs text-slate-400">Scroll down for more</span>
                </div>

                <div class="fade-in">
                    {{ block "main" . }}{{ end }}
                </div>
            </div>
        </main>
    </div>

    <!-- Lucide Icons -->
    <script> lucide.createIcons(); </script>

    <!-- 🌙 日夜模式逻辑 -->
    <script>
        const body = document.body;
        const toggleBtn = document.getElementById("theme-toggle");

        // 初始化：读取 localStorage
        if (localStorage.theme === "dark" ||
           (!("theme" in localStorage) && window.matchMedia("(prefers-color-scheme: dark)").matches)) {
            body.classList.add("dark");
        }

        toggleBtn.addEventListener("click", () => {
            body.classList.toggle("dark");
            localStorage.theme = body.classList.contains("dark") ? "dark" : "light";
        });
    </script>
</body>
</html>
